<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Card Generator</title>
<style>
  :root{
    --navy:#1d2d44;
    --paper:#fdfaf3;
    --ruled:#c9d6e3;
    --ink:#22314a;
    --pass:#2e7d32;
    --fail:#c62828;
    --gold:#b8860b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--navy);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px;
    font-family:"Segoe UI", Arial, sans-serif;
  }
  .wrap{
    display:flex;
    gap:28px;
    max-width:960px;
    width:100%;
    flex-wrap:wrap;
  }
  .form-card{
    flex:1;
    min-width:280px;
    background:#26385a;
    border-radius:10px;
    padding:24px;
    color:#dbe4f0;
  }
  .form-card h2{margin-top:0; font-size:1.1rem; color:var(--gold);}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#9db2cc;
    margin-bottom:5px;
  }
  .field input{
    width:100%;
    padding:9px 10px;
    border-radius:5px;
    border:1px solid #3f5578;
    background:#1a2740;
    color:#fff;
    font-size:0.95rem;
  }
  .marks-row{display:flex; gap:8px;}
  button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:6px;
    background:var(--gold);
    color:#2a2000;
    font-weight:700;
    cursor:pointer;
    margin-top:8px;
  }
  button:hover{filter:brightness(1.08);}

  .card{
    flex:1.2;
    min-width:320px;
    background:var(--paper);
    border-radius:10px;
    padding:0;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.35);
  }
  .card-head{
    background:var(--ink);
    color:#fff;
    padding:16px 20px;
    text-align:center;
  }
  .card-head .school-name{font-weight:700; letter-spacing:2px; font-size:0.95rem;}
  .card-head .sub{font-size:0.72rem; opacity:0.7;}
  .card-body{padding:20px 22px;}
  .row-line{
    display:flex;
    justify-content:space-between;
    border-bottom:1px dashed var(--ruled);
    padding:6px 0;
    font-size:0.92rem;
    color:var(--ink);
  }
  table{width:100%; border-collapse:collapse; margin-top:14px; font-size:0.9rem;}
  th,td{border:1px solid var(--ruled); padding:7px 8px; text-align:left;}
  th{background:#eef2f7; color:var(--ink); font-size:0.78rem; text-transform:uppercase;}
  .grade-A{color:var(--pass); font-weight:700;}
  .grade-F{color:var(--fail); font-weight:700;}
  .result-banner{
    margin-top:16px;
    text-align:center;
    padding:10px;
    border-radius:6px;
    font-weight:700;
    letter-spacing:1px;
  }
  .pass-banner{background:#e8f5e9; color:var(--pass); border:1px solid var(--pass);}
  .fail-banner{background:#fdecea; color:var(--fail); border:1px solid var(--fail);}
  .footer-line{
    margin-top:14px;
    font-size:0.72rem;
    color:#7a8a9c;
    white-space:pre-line;
    border-top:1px solid var(--ruled);
    padding-top:10px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="form-card">
    <h2>Enter Student Details</h2>
    <div class="field">
      <label>Student Name (String Constant)</label>
      <input id="name" type="text" value="Aditi Sharma">
    </div>
    <div class="field">
      <label>Roll Number (Integer Constant)</label>
      <input id="roll" type="number" value="21">
    </div>
    <div class="field">
      <label>Attendance % (Real Constant)</label>
      <input id="attendance" type="number" step="0.1" value="92.5">
    </div>
    <div class="field">
      <label>Gender (Single Character Constant: M / F)</label>
      <input id="gender" type="text" maxlength="1" value="F">
    </div>
    <div class="field">
      <label>Marks — Maths, Science, English (out of 100 each)</label>
      <div class="marks-row">
        <input id="m1" type="number" value="88">
        <input id="m2" type="number" value="76">
        <input id="m3" type="number" value="65">
      </div>
    </div>
    <button onclick="generateReport()">Generate Report Card</button>
  </div>

  <div class="card">
    <div class="card-head">
      <div class="school-name" id="schoolName"></div>
      <div class="sub" id="schoolSub"></div>
    </div>
    <div class="card-body" id="cardBody"></div>
  </div>

</div>

<script>
/* ================= CONSTANTS =================
   These are fixed for every single report card
   generated by this program — the school name,
   the passing rule, the grading scale. They never
   change no matter which student's data you enter. */

const SCHOOL_NAME    = "Green Valley Public School";  // string constant
const BOARD_NAME     = "State Board Affiliation";     // string constant
const SUBJECT_COUNT  = 3;         // integer constant  -> we always test 3 subjects
const PASS_MARK      = 40;        // integer constant  -> minimum marks to pass a subject
const MAX_MARK       = 100;       // integer constant  -> marks are out of 100
const ATTENDANCE_MIN = 75.0;      // real constant     -> minimum attendance % required
const GRADE_A_CUTOFF = 85.0;      // real constant
const GRADE_B_CUTOFF = 70.0;      // real constant
const GRADE_C_CUTOFF = 50.0;      // real constant
const MALE_TAG        = 'M';      // single character constant
const FEMALE_TAG       = 'F';     // single character constant
const NL              = "\n";     // backslash constant -> new line, used to format the printed footer
const TAB             = "\t";     // backslash constant -> used to align the footer columns

function gradeFor(pct){
  if(pct >= GRADE_A_CUTOFF) return 'A';
  if(pct >= GRADE_B_CUTOFF) return 'B';
  if(pct >= GRADE_C_CUTOFF) return 'C';
  return 'F';
}

function generateReport(){
  // ----- VARIABLES: these change every time you press the button -----
  const name = document.getElementById('name').value || "Unnamed Student";
  const roll = parseInt(document.getElementById('roll').value || 0, 10);
  const attendance = parseFloat(document.getElementById('attendance').value || 0);
  const gender = (document.getElementById('gender').value || 'M').toUpperCase();
  const marks = [
    parseInt(document.getElementById('m1').value || 0, 10),
    parseInt(document.getElementById('m2').value || 0, 10),
    parseInt(document.getElementById('m3').value || 0, 10)
  ];
  const subjects = ["Mathematics", "Science", "English"];

  const total = marks.reduce((a,b)=>a+b, 0);
  const outOf = SUBJECT_COUNT * MAX_MARK;
  const pct = (total / outOf) * 100;
  const overallGrade = gradeFor(pct);
  const subjectFailed = marks.some(m => m < PASS_MARK);
  const attendanceOk = attendance >= ATTENDANCE_MIN;
  const finalResult = (!subjectFailed && attendanceOk) ? "PASS" : "FAIL";

  const genderLabel = gender === FEMALE_TAG ? "Female" : (gender === MALE_TAG ? "Male" : "—");

  document.getElementById('schoolName').textContent = SCHOOL_NAME;
  document.getElementById('schoolSub').textContent = BOARD_NAME;

  let rowsHtml = "";
  marks.forEach((m,i)=>{
    const g = gradeFor((m/MAX_MARK)*100);
    rowsHtml += `<tr>
      <td>${subjects[i]}</td>
      <td>${m} / ${MAX_MARK}</td>
      <td class="grade-${g==='F'?'F':'A'}">${g}${m < PASS_MARK ? " (Fail)" : ""}</td>
    </tr>`;
  });

  const footerText =
    `Rules applied to every report card:${NL}` +
    `${TAB}Pass mark per subject: ${PASS_MARK}/${MAX_MARK}${NL}` +
    `${TAB}Minimum attendance required: ${ATTENDANCE_MIN}%${NL}` +
    `${TAB}Grade A cutoff: ${GRADE_A_CUTOFF}%`;

  document.getElementById('cardBody').innerHTML = `
    <div class="row-line"><span>Student Name</span><span>${name}</span></div>
    <div class="row-line"><span>Roll No.</span><span>${roll}</span></div>
    <div class="row-line"><span>Gender</span><span>${genderLabel} ('${gender}')</span></div>
    <div class="row-line"><span>Attendance</span><span>${attendance}% ${attendanceOk ? "(meets minimum)" : "(below minimum)"}</span></div>
    <table>
      <tr><th>Subject</th><th>Marks</th><th>Grade</th></tr>
      ${rowsHtml}
    </table>
    <div class="row-line" style="margin-top:10px;"><span>Total</span><span>${total} / ${outOf}</span></div>
    <div class="row-line"><span>Percentage</span><span>${pct.toFixed(2)}%</span></div>
    <div class="row-line"><span>Overall Grade</span><span>${overallGrade}</span></div>
    <div class="result-banner ${finalResult==='PASS' ? 'pass-banner':'fail-banner'}">${finalResult}</div>
    <div class="footer-line">${footerText}</div>
  `;
}

generateReport();
</script>
</body>
</html>
